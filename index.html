
  <!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messenger</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#0b0f1a;
    color:white;
}

/* HEADER */
.header {
    position:fixed;
    top:0;
    width:100%;
    padding:15px;
    background:#020617;
    text-align:center;
    font-weight:bold;
    border-bottom:1px solid #1e293b;
}

/* CHAT */
#chat {
    margin-top:60px;
    margin-bottom:70px;
    padding:10px;
    overflow-y:auto;
    height:calc(100vh - 130px);
}

/* MESSAGE */
.msg {
    max-width:70%;
    margin:8px 0;
    padding:10px 12px;
    border-radius:15px;
    background:#1e293b;
    word-wrap:break-word;
    animation:fade .2s ease;
}

.me {
    margin-left:auto;
    background:#2563eb;
}

audio {
    width:200px;
}

/* INPUT */
#inputBox {
    position:fixed;
    bottom:0;
    width:100%;
    display:flex;
    align-items:center;
    padding:10px;
    background:#020617;
    border-top:1px solid #1e293b;
}

#input {
    flex:1;
    padding:10px;
    border:none;
    border-radius:20px;
    outline:none;
    background:#111827;
    color:white;
}

.btn {
    margin-left:8px;
    width:40px;
    height:40px;
    border:none;
    border-radius:50%;
    background:#2563eb;
    color:white;
    font-size:18px;
}

/* VOICE PANEL */
#voice-panel {
    display:none;
    position:fixed;
    bottom:80px;
    left:10px;
    right:10px;
    background:#111827;
    padding:15px;
    border-radius:15px;
    text-align:center;
}

@keyframes fade {
    from {opacity:0; transform:translateY(5px);}
    to {opacity:1;}
}
</style>
</head>

<body>

<div class="header">💬 Online Chat</div>

<div id="chat"></div>

<div id="voice-panel">
    🎤 Запись...<br><br>
    <audio id="v-preview" controls style="display:none;"></audio><br><br>
    <button class="btn" onclick="stopRec()">⏹</button>
    <button class="btn" onclick="sendVoice()" id="v-send" style="display:none;">✔</button>
    <button class="btn" onclick="cancelRec()">✖</button>
</div>

<div id="inputBox">
    <input id="input" placeholder="Сообщение...">
    <button class="btn" onclick="sendMsg()">➤</button>
    <button class="btn" onclick="startRec()">🎤</button>
</div>

<script>
const sb = supabase.createClient(
    "https://yialdvgdpuazzedpxozc.supabase.co",
    "sb_publishable_obvuV6Of_iUSWBy6phzv5w_eSQl0YYt"
);

const user = "user_" + Math.floor(Math.random()*10000);
const chat = document.getElementById('chat');
const input = document.getElementById('input');

/* TEXT */
async function sendMsg(){
    if(!input.value) return;

    await sb.from('messages').insert([
        { user_id:user, text:input.value, type:'text' }
    ]);

    input.value='';
    loadMsgs();
}

/* RENDER */
function renderMsg(m){
    const div = document.createElement('div');
    div.className = 'msg ' + (m.user_id===user?'me':'');

    if(m.type==='voice'){
        const a = document.createElement('audio');
        a.controls = true;
        a.src = m.voice;
        div.appendChild(a);
    } else {
        div.textContent = m.text;
    }

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

/* LOAD */
async function loadMsgs(){
    const { data } = await sb.from('messages').select('*').order('id');
    chat.innerHTML='';
    data.forEach(renderMsg);
}

setInterval(loadMsgs,2000);
loadMsgs();

/* VOICE */
let rec, chunks=[], blob;

async function startRec(){
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    rec = new MediaRecorder(stream);
    chunks=[];

    document.getElementById('voice-panel').style.display='block';

    rec.start();
    rec.ondataavailable=e=>chunks.push(e.data);
}

function stopRec(){
    rec.stop();
    rec.onstop=()=>{
        blob = new Blob(chunks,{type:'audio/ogg'});
        const url = URL.createObjectURL(blob);

        const prev = document.getElementById('v-preview');
        prev.src=url;
        prev.style.display='block';

        document.getElementById('v-send').style.display='inline';

        rec.stream.getTracks().forEach(t=>t.stop());
    }
}

function cancelRec(){
    document.getElementById('voice-panel').style.display='none';
    chunks=[];
}

async function sendVoice(){
    const file = 'voice_'+Date.now()+'.ogg';

    await sb.storage.from('voices').upload(file, blob);

    const { data } = sb.storage.from('voices').getPublicUrl(file);

    await sb.from('messages').insert([
        { user_id:user, type:'voice', voice:data.publicUrl }
    ]);

    cancelRec();
    loadMsgs();
}
</script>

</body>
</html>
