<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tanson Platinum</title>
    <style>
        :root { --neon: #00ffe1; --pink: #ff00ff; --gold: #c69c6d; --bg: #050510; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; height: 100vh; overflow: hidden; }
        
        /* ЭКРАН ЗАГРУЗКИ (ЛЬВА ПРИГЛУШИЛ) */
        #splash { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.5s; }
        #splash img { width: 130px; opacity: 0.6; filter: grayscale(0.5) drop-shadow(0 0 10px rgba(198, 156, 109, 0.2)); }
        .loader-bar { width: 180px; height: 2px; background: #111; margin-top: 20px; border-radius: 2px; }
        .loader-fill { width: 0%; height: 100%; background: var(--gold); animation: load 2.5s forwards; }
        @keyframes load { to { width: 100%; } }

        /* ОСНОВНОЙ КОНТЕНТ */
        #main-app { display: none; height: 100vh; flex-direction: column; }
        .header { background: #000; padding: 12px 15px; border-bottom: 1px solid #111; display: flex; justify-content: space-between; align-items: center; }
        
        .screen { display: none; flex: 1; overflow-y: auto; padding-bottom: 80px; }
        .screen.active { display: flex; flex-direction: column; }

        /* ОКНО ЧАТА (ПОДНЯЛ ВЫШЕ, ЧТОБЫ НЕ ЗАКРЫВАЛО) */
        #chat-window { flex: 1; padding: 15px; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; margin-bottom: 75px; }
        .msg { padding: 10px 14px; border-radius: 15px; max-width: 80%; background: #111; border: 1px solid #222; }
        .me { align-self: flex-end; border-color: var(--neon); background: rgba(0,255,225,0.05); }

        /* ПАНЕЛЬ ВВОДА */
        .input-area { position: fixed; bottom: 70px; left: 0; right: 0; background: #000; padding: 10px; border-top: 1px solid #111; display: flex; gap: 8px; z-index: 100; }
        #m-inp { flex: 1; background: #111; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 25px; outline: none; }

        /* НИЖНЕЕ МЕНЮ (ЧАТЫ, КОНТАКТЫ, ПРОФИЛЬ) */
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 70px; background: #000; border-top: 1px solid #111; display: flex; justify-content: space-around; align-items: center; z-index: 200; }
        .nav-btn { background: none; border: none; color: #444; display: flex; flex-direction: column; align-items: center; font-size: 10px; gap: 4px; }
        .nav-btn.active { color: var(--neon); }
        .nav-btn i { font-size: 20px; font-style: normal; }

        /* НАСТРОЙКИ (ТВОИ КОНФИГИ) */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; }
        .modal-box { background: #0a0a15; padding: 25px; border-radius: 20px; border: 1px solid var(--neon); width: 80%; }
    </style>
</head>
<body>

<div id="splash">
    <img src="https://img.icons8.com/ios-filled/150/c69c6d/lion.png" alt="Lion">
    <div class="loader-bar"><div class="loader-fill"></div></div>
</div>

<div id="main-app">
    <div id="scr-chats" class="screen active">
        <div class="header">
            <div style="display:flex; align-items:center; gap:10px;">
                <b style="color:var(--neon)">TANSON</b>
                <button onclick="toggleRadio()" id="radio-btn" style="background:none; border:none; font-size:20px;">📻</button>
            </div>
            <button onclick="openModal('sett-modal')" style="background:none; border:none; color:var(--neon); font-size:20px;">⚙️</button>
        </div>
        <div style="padding:15px;">
            <div onclick="openChat('Общий Чат')" style="background:rgba(255,255,255,0.05); padding:20px; border-radius:15px; border:1px solid var(--neon);">
                🌍 <b>Общий Чат</b>
            </div>
        </div>
    </div>

    <div id="scr-contacts" class="screen">
        <div class="header"><b>Контакты</b></div>
        <div style="padding:20px; color:#444; text-align:center;">Список пуст</div>
    </div>

    <div id="scr-profile" class="screen">
        <div class="header"><b>Профиль</b></div>
        <div style="text-align:center; padding-top:40px;">
            <div style="width:100px; height:100px; border-radius:50%; background:var(--neon); margin:0 auto; display:flex; align-items:center; justify-content:center; font-size:40px;">👤</div>
            <h2>Serega</h2>
            <button style="width:80%; padding:12px; margin-top:20px; border-radius:10px; border:1px solid #333; background:none; color:#fff;">Регистрация</button>
        </div>
    </div>

    <div class="nav-bar">
        <button class="nav-btn active" onclick="switchTab('scr-chats', this)"><i>💬</i>Чаты</button>
        <button class="nav-btn" onclick="switchTab('scr-contacts', this)"><i>👥</i>Друзья</button>
        <button class="nav-btn" onclick="switchTab('scr-profile', this)"><i>👤</i>Профиль</button>
    </div>
</div>

<div id="chat-detail" style="position:fixed; inset:0; background:var(--bg); z-index:300; display:none; flex-direction:column;">
    <div class="header">
        <button onclick="closeChat()" style="background:none; border:none; color:var(--neon); font-size:24px;">←</button>
        <b id="chat-title">Чат</b>
        <div style="width:30px;"></div>
    </div>
    <div id="chat-window"></div>
    <div class="input-area">
        <button style="background:none; border:none; font-size:22px;">📎</button>
        <button style="background:none; border:none; font-size:22px;">🎤</button>
        <input id="m-inp" placeholder="Сообщение...">
        <button onclick="sendMsg()" style="background:var(--neon); border:none; width:44px; height:44px; border-radius:50%;">➤</button>
    </div>
</div>

<div id="sett-modal" class="modal" onclick="closeModal('sett-modal')">
    <div class="modal-box" onclick="event.stopPropagation()">
        <h3 style="color:var(--neon); margin-top:0;">Настройки Tanson</h3>
        <p>Статус: <span style="color:var(--neon)">в сети</span></p>
        <p>Черный список</p>
        <p style="color:var(--pink)">Секретный режим</p>
        <button onclick="localStorage.clear(); location.reload();" style="width:100%; padding:12px; background:#ff0055; border:none; border-radius:10px; color:#fff; font-weight:bold;">Выйти</button>
    </div>
</div>

<audio id="radio-player" src="https://europaplus.hostingradio.ru:8014/ep128.mp3"></audio>

<script>
    // Запуск приложения
    setTimeout(() => {
        document.getElementById('splash').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('splash').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
        }, 500);
    }, 2800);

    function switchTab(id, btn) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function openChat(name) {
        document.getElementById('chat-detail').style.display = 'flex';
        document.getElementById('chat-title').innerText = name;
    }

    function closeChat() { document.getElementById('chat-detail').style.display = 'none'; }
    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    function toggleRadio() {
        const p = document.getElementById('radio-player');
        const b = document.getElementById('radio-btn');
        if(p.paused) { p.play(); b.style.opacity = '0.5'; }
        else { p.pause(); b.style.opacity = '1'; }
    }

    function sendMsg() {
        const i = document.getElementById('m-inp');
        if(!i.value) return;
        const win = document.getElementById('chat-window');
        const d = document.createElement('div');
        d.className = 'msg me';
        d.innerHTML = `<small style="color:var(--neon)">Serega</small><br>${i.value}`;
        win.appendChild(d);
        i.value = '';
        win.scrollTop = win.scrollHeight;
    }
</script>
</body>
</html>
