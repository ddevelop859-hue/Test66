<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messenger</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
}

#chat {
    height:80vh;
    overflow-y:auto;
    padding:10px;
}

.msg {
    margin:5px 0;
    padding:10px;
    border-radius:10px;
    background:#1e293b;
    max-width:80%;
}

.me {
    background:#2563eb;
    margin-left:auto;
}

#inputBox {
    position:fixed;
    bottom:0;
    width:100%;
    display:flex;
    background:#020617;
    padding:10px;
}

#input {
    flex:1;
    padding:10px;
    border:none;
    border-radius:10px;
}

button {
    margin-left:5px;
    border:none;
    border-radius:10px;
    padding:10px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}

#voice-panel {
    display:none;
    position:fixed;
    bottom:70px;
    left:10px;
    right:10px;
    background:#111;
    padding:10px;
    border-radius:10px;
}
</style>
</head>

<body>

<div id="chat"></div>

<div id="voice-panel">
    <span style="color:red;">● Запись...</span><br>
    <audio id="v-preview" controls style="display:none;"></audio><br>
    <button onclick="stopRec()">⏹️</button>
    <button onclick="sendVoice()" id="v-send" style="display:none;">✅</button>
    <button onclick="cancelRec()">❌</button>
</div>

<div id="inputBox">
    <input id="input" placeholder="Введите сообщение...">
    <button onclick="sendMsg()">➤</button>
    <button onclick="startRec()">🎤</button>
</div>

<script>
const sb = supabase.createClient(
    "https://yialdvgdpuazzedpxozc.supabase.co",
    "sb_publishable_obvuV6Of_iUSWBy6phzv5w_eSQl0YYt"
);

const user = "user_" + Math.floor(Math.random()*10000);
const chat = document.getElementById('chat');
const input = document.getElementById('input');

/* ================= TEXT ================= */

async function sendMsg(){
    const text = input.value.trim();
    if(!text) return;

    await sb.from('messages').insert([
        { user_id:user, text:text, type:'text' }
    ]);

    input.value = '';
}

/* ================= RENDER ================= */

function renderMsg(m){
    const div = document.createElement('div');
    div.className = 'msg ' + (m.user_id === user ? 'me':'');

    if(m.type === 'voice'){
        const audio = document.createElement('audio');
        audio.controls = true;
        audio.src = m.voice;
        div.appendChild(audio);
    } else {
        div.textContent = m.text;
    }

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

/* ================= LOAD ================= */

async function loadMsgs(){
    const { data } = await sb
        .from('messages')
        .select('*')
        .order('id');

    chat.innerHTML = '';
    data.forEach(renderMsg);
}

setInterval(loadMsgs, 2000);

/* ================= VOICE ================= */

let mRec;
let chunks = [];
let audioBlob;

async function startRec(){
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    mRec = new MediaRecorder(stream);
    chunks = [];

    document.getElementById('voice-panel').style.display = 'block';
    document.getElementById('v-preview').style.display = 'none';
    document.getElementById('v-send').style.display = 'none';

    mRec.start();

    mRec.ondataavailable = e => chunks.push(e.data);
}

function stopRec(){
    mRec.stop();

    mRec.onstop = ()=>{
        audioBlob = new Blob(chunks, {type:'audio/ogg'});

        const url = URL.createObjectURL(audioBlob);
        const prev = document.getElementById('v-preview');

        prev.src = url;
        prev.style.display = 'block';

        document.getElementById('v-send').style.display = 'inline';

        mRec.stream.getTracks().forEach(t=>t.stop());
    }
}

function cancelRec(){
    document.getElementById('voice-panel').style.display = 'none';
    chunks = [];
    audioBlob = null;
}

async function sendVoice(){
    if(!audioBlob) return;

    const fileName = 'voice_'+Date.now()+'.ogg';

    const { error } = await sb.storage
        .from('voices')
        .upload(fileName, audioBlob);

    if(error){
        alert("Ошибка загрузки: " + error.message);
        return;
    }

    const { data } = sb.storage
        .from('voices')
        .getPublicUrl(fileName);

    await sb.from('messages').insert([
        {
            user_id:user,
            type:'voice',
            voice:data.publicUrl
        }
    ]);

    cancelRec();
}
</script>

</body>
</html>
