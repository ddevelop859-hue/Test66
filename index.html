<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tanson Chat</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<style>
body {margin:0;font-family:Arial;background:#0b0f2a;color:white;display:flex;flex-direction:column;height:100vh;}
header {display:flex;justify-content:space-between;align-items:center;padding:10px 15px;background:#111;font-size:20px;font-weight:bold;}
#chat {flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;}
.msg {background:#1a1f4a;padding:8px 12px;border-radius:20px;margin:5px 0;max-width:70%;word-wrap:break-word;align-self:flex-start;display:flex;flex-direction:column;gap:4px;position:relative;user-select:none;}
.me {background:#2a6df5;margin-left:auto;align-self:flex-end;}
.msg-header {display:flex;justify-content:space-between;align-items:center;}
.msg-header button {background:none;border:none;color:#aaa;font-size:18px;cursor:pointer;}
.bottom {display:flex;padding:10px;background:#000;}
input {flex:1;padding:10px;border:none;border-radius:20px;outline:none;background:#111;color:white;}
button {margin-left:5px;padding:10px 12px;border:none;border-radius:50%;background:#2a6df5;color:white;cursor:pointer;}
#voice-panel {display:none;padding:10px;background:#111;text-align:center;}
#voice-panel button {border-radius:50%;width:50px;height:50px;margin:5px;}
canvas#recordWave {width:100%;height:60px;background:#111;border-radius:10px;}
.voice-msg {display:flex;align-items:center;gap:8px;}
.voice-wave {display:flex;align-items:flex-end;height:30px;gap:2px;}
.voice-bar {width:3px;background:#fff;}
.context-menu {position:absolute;background:#222;border:1px solid #555;border-radius:5px;display:none;flex-direction:column;z-index:1000;}
.context-menu button {background:none;border:none;color:white;padding:5px 10px;text-align:left;cursor:pointer;}
</style>
</head>
<body>

<header>
    <div style="display:flex; align-items:center; gap:10px;">
        <span>Tanson</span>
        <button id="toggleRadio" style="padding:5px 10px; border-radius:10px;">▶ Европа Plus</button>
    </div>
    <audio id="radioPlayer" src="https://online-radio.eu/radio/39938-europa-plus" type="audio/mpeg" autoplay loop></audio>
</header>

<div id="chat"></div>

<div id="voice-panel">
    <canvas id="recordWave"></canvas><br>
    <button id="cancelVoice">✖</button>
    <button id="sendVoiceBtn">✔</button>
</div>

<div class="bottom">
    <input id="msg" placeholder="Сообщение...">
    <button id="sendTextBtn">➤</button>
    <button id="recBtn">🎤</button>
</div>

<div id="contextMenu" class="context-menu">
    <button id="deleteSelf">Удалить у себя</button>
    <button id="deleteAll">Удалить у всех</button>
</div>

<script>
const SUPABASE_URL = "https://yialdvgdpuazzedpxozc.supabase.co";
const SUPABASE_KEY = "sb_publishable_obvuV6Of_iUSWBy6phzv5w_eSQl0YYt";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let userData = { name: "user_" + Math.floor(Math.random()*1000) };
const chat = document.getElementById("chat");
const contextMenu = document.getElementById("contextMenu");
let selectedMsg = null;

// Радио кнопка
const radioPlayer = document.getElementById("radioPlayer");
document.getElementById("toggleRadio").onclick = ()=>{
    if(radioPlayer.paused) radioPlayer.play(); else radioPlayer.pause();
}

// Рендер сообщений
function render(msg){
    if(chat.querySelector(`[data-id="${msg.id}"]`)) return;
    let div = document.createElement("div");
    div.className = "msg" + (msg.user_id===userData.name?" me":"");
    div.dataset.id = msg.id;

    const headerDiv = document.createElement("div");
    headerDiv.className="msg-header";
    const dotsBtn = document.createElement("button");
    dotsBtn.innerText="…";
    dotsBtn.onclick = (e)=>{
        e.stopPropagation();
        selectedMsg={div,msg};
        contextMenu.style.top=e.clientY+"px";
        contextMenu.style.left=e.clientX+"px";
        contextMenu.style.display="flex";
    };
    headerDiv.appendChild(dotsBtn);
    div.appendChild(headerDiv);

    if(msg.type==="voice"){
        const container=document.createElement("div");
        container.className="voice-msg";
        const audio=new Audio(msg.voice);
        audio.preload="auto"; audio.load();

        const playBtn=document.createElement("button");
        playBtn.innerText="▶";
        playBtn.onclick=()=>{
            if(audio.paused){audio.play().catch(e=>console.log(e)); playBtn.innerText="⏸";}
            else {audio.pause(); playBtn.innerText="▶";}
        }

        const waveDiv=document.createElement("div");
        waveDiv.className="voice-wave";
        if(msg.wave) msg.wave.forEach(h=>{
            const bar=document.createElement("div");
            bar.className="voice-bar";
            bar.style.height=(h*30)+"px";
            waveDiv.appendChild(bar);
        });

        container.appendChild(playBtn);
        container.appendChild(waveDiv);
        div.appendChild(container);
    } else {
        const textDiv=document.createElement("div");
        textDiv.innerText=msg.text;
        div.appendChild(textDiv);
    }

    chat.appendChild(div);
    chat.scrollTop=chat.scrollHeight;
}

// Загрузка старых
async function load(){
    const { data } = await sb.from("messages").select("*").order("id",{ascending:true});
    chat.innerHTML="";
    data.forEach(msg=>render(msg));
}
load();

// Подписка
sb.channel('chat').on('postgres_changes',{event:'INSERT',schema:'public',table:'messages'},payload=>{
    render(payload.new);
}).subscribe();

// Отправка текста
document.getElementById("sendTextBtn").onclick = async ()=>{
    let text=document.getElementById("msg").value;
    if(!text) return;
    await sb.from("messages").insert([{user_id:userData.name,text:text,type:"text"}]);
    document.getElementById("msg").value="";
}

// ГОЛОСОВЫЕ
let rec, chunks=[], blob, recStream;
let audioCtx, analyser, dataArray, source, rafId;
const recBtn=document.getElementById("recBtn");
const canvas=document.getElementById("recordWave");
const ctx=canvas.getContext("2d");

// Начало записи
recBtn.addEventListener('mousedown',startRec);
recBtn.addEventListener('touchstart',startRec);

async function startRec(){
    recStream = await navigator.mediaDevices.getUserMedia({audio:true});
    rec = new MediaRecorder(recStream);
    chunks=[]; rec.start();

    audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    analyser=audioCtx.createAnalyser();
    source=audioCtx.createMediaStreamSource(recStream);
    source.connect(analyser);
    analyser.fftSize=256;
    dataArray=new Uint8Array(analyser.frequencyBinCount);
    drawWave(); document.getElementById("voice-panel").style.display="block";

    rec.ondataavailable=e=>chunks.push(e.data);
}

function drawWave(){
    rafId=requestAnimationFrame(drawWave);
    analyser.getByteTimeDomainData(dataArray);
    ctx.fillStyle='#111'; ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.lineWidth=2; ctx.strokeStyle='#2a6df5'; ctx.beginPath();
    const sliceWidth=canvas.width/dataArray.length; let x=0;
    for(let i=0;i<dataArray.length;i++){
        let v=dataArray[i]/128.0; let y=v*canvas.height/2;
        if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
        x+=sliceWidth;
    }
    ctx.lineTo(canvas.width,canvas.height/2); ctx.stroke();
}

function stopRec(finalize=false){
    if(!rec) return;
    rec.stop();
    if(recStream) recStream.getTracks().forEach(t=>t.stop());
    cancelAnimationFrame(rafId);
    ctx.clearRect(0,0,canvas.width,canvas.height);
    rec.onstop = async ()=>{
        if(finalize){ blob=new Blob(chunks,{type:'audio/ogg'}); await sendVoice();}
        document.getElementById("voice-panel").style.display="none";
        rec=null; recStream=null; chunks=[];
    };
}

document.getElementById("cancelVoice").onclick = ()=>stopRec(false);
document.getElementById("sendVoiceBtn").onclick = ()=>stopRec(true);

// мини‑волна
function createMiniWave(blob){
    return new Promise(resolve=>{
        const audioCtx=new (window.AudioContext||window.webkitAudioContext)();
        const reader=new FileReader();
        reader.onload=async e=>{
            const arrayBuffer=e.target.result;
            const buffer=await audioCtx.decodeAudioData(arrayBuffer);
            const raw=buffer.getChannelData(0);
            const step=Math.ceil(raw.length/50);
            const wave=Array.from({length:50},(_,i)=>{
                let max=0;
                for(let j=0;j<step;j++){const v=Math.abs(raw[i*step+j]); if(v>max) max=v;}
                return max;
            });
            resolve(wave);
        }
        reader.readAsArrayBuffer(blob);
    });
}

// отправка голосового
async function sendVoice(){
    if(!blob) return;
    const wave = await createMiniWave(blob);
    const name='voice_'+Date.now()+'.ogg';
    const { error } = await sb.storage.from('voices').upload(name, blob, {upsert:true});
    if(error){alert("Ошибка загрузки голоса: "+error.message); return;}
    const { data } = sb.storage.from('voices').getPublicUrl(name);
    const url = data.publicUrl;
    await sb.from('messages').insert([{user_id:userData.name,type:'voice',voice:url,wave:wave}]);
}

// удаление
document.getElementById("deleteSelf").onclick=()=>{
    if(selectedMsg){selectedMsg.div.remove(); selectedMsg=null; contextMenu.style.display="none";}
}
document.getElementById("deleteAll").onclick=async()=>{
    if(selectedMsg){await sb.from('messages').delete().eq('id',selectedMsg.msg.id); selectedMsg.div.remove(); selectedMsg=null; contextMenu.style.display="none";}
}
document.addEventListener("click",()=>{contextMenu.style.display="none";});
</script>

</body>
</html>
