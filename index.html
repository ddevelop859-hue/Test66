<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tanson Platinum Build</title>
    <style>
        :root { --neon: #00ffe1; --pink: #ff00ff; --gold: #c69c6d; --bg: #050510; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; height: 100vh; overflow: hidden; }

        /* ЛЕВ НА ЗАСТАВКЕ */
        #splash { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.8s; }
        #splash img { width: 130px; opacity: 0.5; filter: drop-shadow(0 0 15px var(--gold)); }
        .loader { width: 160px; height: 2px; background: #111; margin-top: 30px; border-radius: 2px; overflow: hidden; }
        .loader-fill { width: 0%; height: 100%; background: var(--gold); animation: load 3s forwards; }

        /* ОСНОВНОЙ КОНТЕЙНЕР */
        #main-app { display: none; height: 100vh; flex-direction: column; }
        .header { background: #000; padding: 15px; border-bottom: 1px solid #111; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .header b { color: var(--neon); letter-spacing: 1px; }

        .screen { display: none; flex: 1; overflow-y: auto; padding-bottom: 80px; }
        .screen.active { display: flex; flex-direction: column; }

        /* ЧАТ И ПРАВИЛЬНОЕ ОТОБРАЖЕНИЕ СООБЩЕНИЙ */
        #chat-window { flex: 1; padding: 15px; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; background: var(--bg); }
        .msg { padding: 12px; border-radius: 18px; max-width: 80%; background: #0d0d1a; border: 1px solid #1a1a2a; position: relative; word-wrap: break-word; }
        .me { align-self: flex-end; border-color: var(--neon); background: rgba(0,255,225,0.03); }
        .msg-u { font-size: 10px; color: var(--neon); margin-bottom: 4px; font-weight: bold; }

        /* МЕДИА-КОНТЕНТ */
        video, audio { width: 100%; border-radius: 10px; margin-top: 5px; background: #000; }

        /* ПАНЕЛЬ ВВОДА (ФИКСИРОВАННАЯ) */
        .input-area { background: #000; padding: 10px 15px; display: flex; align-items: center; gap: 12px; border-top: 1px solid #111; z-index: 900; }
        #m-inp { flex: 1; background: #111; border: 1px solid #222; color: #fff; padding: 12px 18px; border-radius: 25px; outline: none; }
        .btn-m { background: none; border: none; font-size: 24px; color: #444; cursor: pointer; }

        /* НАВИГАЦИЯ */
        .nav-bar { height: 70px; background: #000; border-top: 1px solid #111; display: flex; justify-content: space-around; align-items: center; }
        .nav-btn { background: none; border: none; color: #444; display: flex; flex-direction: column; align-items: center; font-size: 10px; gap: 4px; }
        .nav-btn.active { color: var(--neon); }
        .nav-btn span { font-size: 22px; }

        /* МОДАЛКА (НАСТРОЙКИ) */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; }
        .modal-box { background: #0a0a15; padding: 25px; border-radius: 25px; border: 1px solid #1a1a2a; width: 85%; max-width: 300px; }

        @keyframes load { to { width: 100%; } }
    </style>
</head>
<body>

<div id="splash">
    <img src="https://img.icons8.com/ios-filled/200/c69c6d/lion.png" alt="Lion">
    <div class="loader"><div class="loader-fill"></div></div>
</div>

<div id="main-app">
    <div id="scr-chats" class="screen active">
        <div class="header">
            <b>TANSON PLATINUM</b>
            <button onclick="toggleSett(true)" style="background:none; border:none; font-size:20px;">⚙️</button>
        </div>
        <div style="padding:15px;">
            <div onclick="openChat('Global Chat')" style="background:rgba(255,255,255,0.02); padding:20px; border-radius:18px; border:1px solid #1a1a2a; display:flex; align-items:center; gap:15px;">
                <span style="font-size:26px;">🌍</span>
                <div><b>Общий Чат</b><br><small style="color:#555;">Serega, Tanya, Sonya</small></div>
            </div>
        </div>
    </div>

    <div id="scr-profile" class="screen">
        <div class="header"><b>Мой Профиль</b></div>
        <div style="text-align:center; padding:40px;">
            <div style="width:100px; height:100px; border-radius:50%; border:2px solid var(--neon); margin:0 auto 20px; display:flex; align-items:center; justify-content:center; font-size:40px;">👤</div>
            <h2 id="u-display">Seregasib</h2>
            <p style="color:#555;">ID: 777-2026</p>
        </div>
    </div>

    <div class="nav-bar">
        <button class="nav-btn active" onclick="switchTab('scr-chats', this)"><span>💬</span>Чаты</button>
        <button class="nav-btn" onclick="switchTab('scr-profile', this)"><span>👤</span>Профиль</button>
    </div>
</div>

<div id="chat-page" style="position:fixed; inset:0; background:var(--bg); z-index:1500; display:none; flex-direction:column;">
    <div class="header">
        <button onclick="closeChat()" style="background:none; border:none; color:var(--neon); font-size:24px;">←</button>
        <b id="c-title">Чат</b>
        <div style="font-size:10px; color:#0f0;">online</div>
    </div>
    
    <div id="chat-window"></div>
    
    <div class="input-area">
        <button class="btn-m" onclick="document.getElementById('f-in').click()">📎</button>
        <button class="btn-m">🎤</button>
        <input id="m-inp" placeholder="Сообщение...">
        <button onclick="sendMsg()" style="background:var(--neon); border:none; width:44px; height:44px; border-radius:50%; font-size:18px; color:#000;">➤</button>
    </div>
</div>

<div id="sett-modal" class="modal" onclick="toggleSett(false)">
    <div class="modal-box" onclick="event.stopPropagation()">
        <h3 style="color:var(--neon); margin:0 0 20px 0;">Настройки</h3>
        <div style="margin-bottom:15px; font-size:14px;">Статус: <span style="color:#0f0">в сети</span></div>
        <div style="margin-bottom:15px; font-size:14px;">Секретный режим: <span style="color:var(--pink)">Выключено</span></div>
        <button onclick="localStorage.clear(); location.reload();" style="width:100%; padding:12px; background:#ff0055; border:none; border-radius:12px; color:#fff; font-weight:bold;">Выход</button>
        <button onclick="toggleSett(false)" style="width:100%; margin-top:10px; background:none; border:none; color:#555;">ЗАКРЫТЬ</button>
    </div>
</div>

<input type="file" id="f-in" style="display:none">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // ТВОИ КОНФИГИ (S_URL, S_KEY) - ОСТАВИЛ КАК БЫЛО
    const S_URL = 'https://yialdvgdpuazzedpxozc.supabase.co';
    const S_KEY = 'sb_publishable_obvuV6Of_iUSWBy6phzv5w_eSQl0YYt';
    const sb = supabase.createClient(S_URL, S_KEY);
    const user = "Seregasib";

    // Сплеш
    window.onload = () => {
        setTimeout(() => {
            document.getElementById('splash').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('splash').style.display = 'none';
                document.getElementById('main-app').style.display = 'flex';
            }, 800);
        }, 3000);
    };

    function switchTab(id, btn) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function openChat(name) {
        document.getElementById('chat-page').style.display = 'flex';
        document.getElementById('c-title').innerText = name;
        loadMsgs();
    }
    function closeChat() { document.getElementById('chat-page').style.display = 'none'; }
    function toggleSett(show) { document.getElementById('sett-modal').style.display = show ? 'flex' : 'none'; }

    async function loadMsgs() {
        const { data } = await sb.from('messages').select('*').order('created_at', {ascending:true});
        const win = document.getElementById('chat-window');
        win.innerHTML = '';
        if(data) data.forEach(m => {
            const isMe = m.user_id === user;
            const div = document.createElement('div');
            div.className = `msg ${isMe ? 'me' : ''}`;
            
            let content = m.text || '';
            // Проверка на медиа-ссылки (базовая)
            if(content.endsWith('.mp4')) content = `<video controls src="${content}"></video>`;
            if(content.endsWith('.mp3')) content = `<audio controls src="${content}"></audio>`;

            div.innerHTML = `<div class="msg-u">${m.user_id}</div>${content}`;
            win.appendChild(div);
        });
        win.scrollTop = win.scrollHeight;
    }

    async function sendMsg() {
        const i = document.getElementById('m-inp');
        if(!i.value.trim()) return;
        const txt = i.value; i.value = '';
        await sb.from('messages').insert([{ text: txt, user_id: user, channel: 'global' }]);
        loadMsgs();
    }

    // Авто-прокрутка при вводе
    document.getElementById('m-inp').addEventListener('focus', () => {
        setTimeout(() => {
            const win = document.getElementById('chat-window');
            win.scrollTop = win.scrollHeight;
        }, 300);
    });
</script>
</body>
</html>
