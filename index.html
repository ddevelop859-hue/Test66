<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SST Messenger v6.6 Platinum</title>
    <style>
        :root { --neon: #00ffe1; --pink: #ff00ff; --bg: #050510; --card: rgba(20, 25, 50, 0.4); }
        
        /* 1. Кастомный неоновый скроллбар */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #050510; }
        ::-webkit-scrollbar-thumb { background: var(--neon); border-radius: 10px; }

        /* 2. Анимированный градиентный фон */
        body { 
            background: linear-gradient(-45deg, #050510, #101025, #0a0a20, #050510);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #fff; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden; 
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 3. Эффект матового стекла (Glassmorphism) */
        .header-box { 
            background: rgba(0, 0, 0, 0.6); 
            backdrop-filter: blur(15px);
            padding: 15px; 
            border-bottom: 1px solid rgba(0, 255, 225, 0.3); 
            z-index: 10;
        }

        .search-bar { 
            width: 100%; padding: 12px; border-radius: 12px; 
            border: 1px solid rgba(255,255,255,0.1); 
            background: rgba(255,255,255,0.05); 
            color: #fff; outline: none; box-sizing: border-box;
            transition: 0.3s;
        }
        .search-bar:focus { border-color: var(--neon); background: rgba(255,255,255,0.1); }

        .list-container { flex: 1; overflow-y: auto; padding: 15px; }

        .item-card { 
            background: var(--card); 
            backdrop-filter: blur(5px);
            padding: 15px; border-radius: 20px; margin-bottom: 10px; 
            display: flex; align-items: center; gap: 15px; 
            border: 1px solid rgba(255,255,255,0.05);
            transition: 0.3s;
        }
        .item-card:active { transform: scale(0.97); background: rgba(0, 255, 225, 0.1); }

        .avatar { 
            width: 50px; height: 50px; border-radius: 50%; 
            background: linear-gradient(135deg, var(--neon), var(--pink)); 
            display: flex; align-items: center; justify-content: center; 
            color: #000; font-weight: bold; box-shadow: 0 0 15px rgba(0, 255, 225, 0.3);
        }

        /* Чат и сообщения */
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        
        .msg { 
            padding: 12px 16px; border-radius: 20px; max-width: 80%; 
            background: rgba(255, 255, 255, 0.07); 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1); 
            position: relative; animation: msgIn 0.3s ease-out;
        }
        @keyframes msgIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .me { align-self: flex-end; border-color: rgba(0, 255, 225, 0.4); background: rgba(0, 255, 225, 0.1); }
        .msg-time { font-size: 9px; opacity: 0.5; margin-top: 5px; display: block; text-align: right; }

        /* Ввод и кнопки */
        .chat-input-area { 
            padding: 15px; background: rgba(0, 0, 0, 0.7); 
            backdrop-filter: blur(20px);
            display: flex; gap: 10px; align-items: center; border-top: 1px solid rgba(255,255,255,0.05); 
        }

        .circle-btn { 
            width: 45px; height: 45px; border-radius: 50%; border: none; 
            background: var(--neon); color: #000; font-size: 22px; 
            display: flex; align-items: center; justify-content: center; 
            flex-shrink: 0; transition: 0.2s;
        }
        .circle-btn:active { transform: scale(0.85); filter: brightness(1.2); }

        #voice-btn.recording { background: #ff0055 !important; color: #fff !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255,0,85,0.7); } 70% { box-shadow: 0 0 0 15px rgba(255,0,85,0); } 100% { box-shadow: 0 0 0 0 rgba(255,0,85,0); } }

        .chat-media { max-width: 100%; border-radius: 15px; margin-top: 8px; border: 1px solid rgba(255,255,255,0.1); }
        audio { width: 100%; height: 35px; margin-top: 8px; filter: invert(1) hue-rotate(180deg); opacity: 0.9; }
        
        .screen { display: none; flex-direction: column; height: 100%; width: 100%; }
        .active-screen { display: flex; }
    </style>
</head>
<body>

<div id="fs-overlay" onclick="this.style.display='none'" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:5000; align-items:center; justify-content:center;"><img id="fs-img" style="max-width:95%; max-height:95%; border-radius:10px;"></div>

<div id="auth-screen" style="display:none; position:fixed; inset:0; background:var(--bg); z-index:9000; align-items:center; justify-content:center; padding:20px;">
    <div style="text-align:center; background:rgba(20,25,50,0.8); padding:40px; border-radius:30px; border:1px solid var(--neon); backdrop-filter:blur(20px); width:100%; max-width:320px;">
        <h2 style="color:var(--neon); letter-spacing:3px; margin-bottom:30px;">SST LOGIN</h2>
        <input id="nick-input" class="search-bar" placeholder="Твой ник..." style="text-align:center; margin-bottom:20px;">
        <button onclick="register()" class="circle-btn" style="width:100%; border-radius:15px; font-weight:bold;">ВОЙТИ</button>
    </div>
</div>

<div id="main-screen" class="screen active-screen">
    <div class="header-box">
        <div style="color:var(--neon); font-weight:bold; margin-bottom:15px; text-align:center; letter-spacing:3px; font-size:18px;">SST PLATINUM</div>
        <input type="text" id="search-input" class="search-bar" placeholder="Поиск контактов..." oninput="filterContacts()">
    </div>
    <div class="list-container">
        <div id="contacts-list">
            <div class="item-card" onclick="openChat('Общий Чат')"><div class="avatar">G</div><div><b>Общий Чат</b><br><small style="opacity:0.6;">Все онлайн</small></div></div>
        </div>
    </div>
</div>

<div id="chat-screen" class="screen">
    <div class="header-box" style="display:flex; align-items:center; gap:15px; padding:12px;">
        <button onclick="closeChat()" style="background:none; border:none; color:var(--neon); font-size:28px; cursor:pointer;">←</button>
        <div id="chat-target-name" style="font-weight:bold; color:var(--neon); font-size:18px;">Чат</div>
    </div>
    <div id="chat-window"></div>
    <div class="chat-input-area">
        <button class="circle-btn" style="background:none; border:1px solid var(--neon); color:var(--neon);" onclick="document.getElementById('f').click()">📎</button>
        <button id="voice-btn" class="circle-btn" style="background:none; border:1px solid var(--pink); color:var(--pink);">🎤</button>
        <input id="minp" class="search-bar" placeholder="Сообщение...">
        <button class="circle-btn" onclick="sendMsg('text')">➤</button>
    </div>
</div>

<input type="file" id="f" style="display:none" accept="image/*,video/*" onchange="upFile(this.files[0])">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const S_URL = 'https://yialdvgdpuazzedpxozc.supabase.co';
    const S_KEY = 'sb_publishable_obvuV6Of_iUSWBy6phzv5w_eSQl0YYt'; 
    const sb = supabase.createClient(S_URL, S_KEY);
    let myNick = localStorage.getItem("sst_nick");
    let mediaRecorder, audioChunks = [];

    if(!myNick) document.getElementById("auth-screen").style.display="flex"; else init();

    function register() {
        const n = document.getElementById("nick-input").value.trim();
        if(n.length < 2) return;
        localStorage.setItem("sst_nick", n);
        location.reload();
    }

    function openChat(name) {
        document.getElementById("main-screen").classList.remove("active-screen");
        document.getElementById("chat-screen").classList.add("active-screen");
        document.getElementById("chat-target-name").innerText = name;
        document.getElementById("chat-window").innerHTML = "";
        loadHistory();
    }

    function closeChat() {
        document.getElementById("chat-screen").classList.remove("active-screen");
        document.getElementById("main-screen").classList.add("active-screen");
    }

    async function init() {
        sb.channel('global').on('postgres_changes', {event:'*', schema:'public', table:'messages'}, p => {
            if(p.eventType === 'INSERT') render(p.new);
        }).subscribe();
        setupVoice();
    }

    async function loadHistory() {
        const {data} = await sb.from('messages').select('*').order('created_at', {ascending:true}).limit(50);
        if(data) data.forEach(m => render(m));
    }

    function render(d) {
        const win = document.getElementById("chat-window");
        const div = document.createElement("div");
        div.className = `msg ${d.user_id === myNick ? 'me' : ''}`;
        const time = new Date(d.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        
        let html = `<small style="color:var(--neon); font-weight:bold; font-size:10px;">${d.user_id}</small><br>`;
        if(d.type === 'image') html += `<img src="${d.file_url}" class="chat-media" onclick="showFS('${d.file_url}')">`;
        else if(d.type === 'video') html += `<video src="${d.file_url}" class="chat-media" controls></video>`;
        else if(d.type === 'voice') html += `<audio src="${d.file_url}" controls></audio>`;
        else html += d.text || "";
        html += `<span class="msg-time">${time}</span>`;
        
        div.innerHTML = html;
        win.appendChild(div);
        win.scrollTop = win.scrollHeight;
    }

    function showFS(url) { document.getElementById("fs-img").src=url; document.getElementById("fs-overlay").style.display="flex"; }

    async function sendMsg(type, url=null) {
        const i = document.getElementById("minp");
        if(!i.value.trim() && !url) return;
        await sb.from('messages').insert([{text: i.value, user_id: myNick, type: type, file_url: url}]);
        i.value = "";
    }

    async function upFile(file) {
        if(!file) return;
        const name = `f_${Date.now()}_${file.name}`;
        const {data} = await sb.storage.from('uploads').upload(name, file);
        if(data) {
            const {data:{publicUrl}} = sb.storage.from('uploads').getPublicUrl(name);
            sendMsg(file.type.startsWith('video') ? 'video' : 'image', publicUrl);
        }
    }

    function setupVoice() {
        const vBtn = document.getElementById('voice-btn');
        vBtn.onclick = async () => {
            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
                vBtn.classList.remove('recording');
                return;
            }
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const mime = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus' : 'audio/mp4';
                mediaRecorder = new MediaRecorder(stream, { mimeType: mime });
                audioChunks = [];
                mediaRecorder.ondataavailable = e => { if(e.data.size > 0) audioChunks.push(e.data); };
                mediaRecorder.onstop = async () => {
                    const blob = new Blob(audioChunks, { type: mime });
                    const name = `v_${Date.now()}.webm`;
                    const {data} = await sb.storage.from('uploads').upload(name, blob);
                    if(data) {
                        const {data:{publicUrl}} = sb.storage.from('uploads').getPublicUrl(name);
                        sendMsg('voice', publicUrl);
                    }
                    stream.getTracks().forEach(t => t.stop());
                };
                mediaRecorder.start();
                vBtn.classList.add('recording');
            } catch(e) { alert("Микрофон работает только через HTTPS!"); }
        };
    }
</script>
</body>
</html>
