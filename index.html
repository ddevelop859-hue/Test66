<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tanson</title>
    <style>
        :root { --neon: #00f2ff; --pink: #ff00ff; --bg: #050510; --panel: #0a0a15; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; height: 100vh; overflow: hidden; }

        /* HEADER */
        .header { background: #000; padding: 15px; border-bottom: 1px solid #1a1a2a; display: flex; justify-content: space-between; align-items: center; }
        .header b { color: var(--neon); letter-spacing: 2px; font-size: 18px; text-transform: uppercase; }

        .screen { display: none; flex: 1; overflow-y: auto; padding-bottom: 90px; }
        .screen.active { display: flex; flex-direction: column; }

        /* MESSAGES */
        #chat-window { flex: 1; padding: 15px; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; }
        .msg { padding: 12px 16px; border-radius: 18px; max-width: 80%; background: #101020; border: 1px solid #1a1a2a; position: relative; }
        .me { align-self: flex-end; border-color: var(--neon); background: rgba(0, 242, 255, 0.05); }
        .msg-u { font-size: 10px; color: var(--neon); margin-bottom: 4px; font-weight: bold; }

        /* FIXED BOTTOM NAV */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 75px; background: #000; border-top: 1px solid #1a1a2a; display: flex; justify-content: space-around; align-items: center; z-index: 2000; }
        .nav-btn { background: none; border: none; color: #444; display: flex; flex-direction: column; align-items: center; font-size: 10px; gap: 5px; width: 25%; }
        .nav-btn.active { color: var(--neon); }
        .nav-btn span { font-size: 22px; }

        /* INPUT AREA & RECORDER */
        .input-area { background: #000; padding: 10px 15px; display: flex; align-items: center; gap: 10px; border-top: 1px solid #1a1a2a; position: relative; }
        #m-inp { flex: 1; background: #0f0f1a; border: 1px solid #222; color: #fff; padding: 12px 18px; border-radius: 25px; font-size: 14px; }
        .btn-act { background: none; border: none; font-size: 22px; color: #666; cursor: pointer; }
        .btn-send { background: var(--neon); border: none; width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 10px rgba(0,242,255,0.3); }

        /* VOICE RECORDER UI */
        #voice-panel { display: none; position: absolute; bottom: 65px; left: 0; width: 100%; background: #000; padding: 12px 20px; border-top: 1px solid var(--pink); align-items: center; justify-content: space-between; z-index: 1500; }
        #voice-preview { height: 35px; border-radius: 10px; flex: 1; margin: 0 15px; }

        /* MODALS */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 5000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-box { background: var(--panel); padding: 25px; border-radius: 25px; border: 1px solid var(--neon); width: 85%; max-width: 320px; }
        .opt-btn { width: 100%; padding: 15px; margin: 8px 0; background: #151525; border: 1px solid #222; color: #fff; border-radius: 12px; text-align: left; }
        
        audio, video { width: 100%; margin-top: 5px; border-radius: 10px; }
    </style>
</head>
<body>

<div id="main-app" style="display: flex; height: 100vh; flex-direction: column;">
    <div id="scr-chats" class="screen active">
        <div class="header"><b>Tanson</b><button onclick="openModal('modal-settings')" style="background:none; border:none; color:#555; font-size:20px;">⚙️</button></div>
        <div style="padding:15px;" onclick="openChat('Общий Чат')">
            <div style="background:var(--panel); padding:20px; border-radius:22px; border:1px solid #1a1a2a; display:flex; align-items:center; gap:15px;">
                <span style="font-size:30px;">🌍</span>
                <div><b>Общий Чат</b><br><small style="color:#555;">Система Platinum</small></div>
            </div>
        </div>
    </div>

    <div id="scr-contacts" class="screen">
        <div class="header"><b>Контакты</b></div>
        <div style="padding:15px;">
            <div style="background:var(--panel); padding:15px; border-radius:15px; border:1px solid #222;">Поддержка Tanson</div>
        </div>
    </div>

    <div id="scr-radio" class="screen">
        <div class="header"><b>Радио Tanson</b></div>
        <div style="padding:25px; text-align:center;">
            <div id="r-stat" style="color:var(--neon); margin-bottom:20px;">Сейчас: Выключено</div>
            <button class="opt-btn" onclick="playR('https://ep256.hostingradio.ru:8052/europaplus256.mp3', 'Europa Plus')">▶ Europa Plus (Live)</button>
            <button class="opt-btn" onclick="playR('http://icecast.mgradio.ru/relaxfm-128', 'Relax FM')">▶ Relax FM</button>
            <button onclick="stopR()" style="margin-top:20px; background:none; border:none; color:red;">ОТКЛЮЧИТЬ</button>
        </div>
    </div>

    <div id="scr-profile" class="screen">
        <div class="header"><b>Профиль</b></div>
        <div style="text-align:center; padding:50px;">
            <div style="width:100px; height:100px; border-radius:50%; border:2px solid var(--neon); margin:0 auto 20px; background:#000; font-size:40px; display:flex; align-items:center; justify-content:center;">👤</div>
            <h2>Seregasib</h2>
            <div style="color:#0f0;">• В СЕТИ</div>
        </div>
    </div>

    <div class="nav-bar">
        <button class="nav-btn active" onclick="switchTab('scr-chats', this)"><span>💬</span>Чаты</button>
        <button class="nav-btn" onclick="switchTab('scr-contacts', this)"><span>👥</span>Контакты</button>
        <button class="nav-btn" onclick="switchTab('scr-radio', this)"><span>📻</span>Радио</button>
        <button class="nav-btn" onclick="switchTab('scr-profile', this)"><span>👤</span>Профиль</button>
    </div>
</div>

<div id="chat-page" style="position:fixed; inset:0; background:var(--bg); z-index:3000; display:none; flex-direction:column;">
    <div class="header">
        <button onclick="closeChat()" style="background:none; border:none; color:var(--neon); font-size:30px;">←</button>
        <b>Общий Чат</b>
        <div style="font-size:10px; color:#0f0;">online</div>
    </div>
    
    <div id="chat-window"></div>

    <div id="voice-panel">
        <span id="v-timer" style="color:red; font-size:12px;">Запись...</span>
        <audio id="voice-preview" controls style="display:none;"></audio>
        <div style="display:flex; gap:12px;">
            <button onclick="stopRec()" id="rec-stop-btn" style="background:none; border:none; font-size:20px;">⏹️</button>
            <button onclick="sendVoice()" id="rec-send-btn" style="background:none; border:none; font-size:20px; display:none;">✅</button>
            <button onclick="cancelRec()" style="background:none; border:none; font-size:20px;">❌</button>
        </div>
    </div>

    <div class="input-area">
        <button class="btn-act">📎</button>
        <button class="btn-act" onclick="startRec()">🎤</button>
        <input id="m-inp" placeholder="Введите сообщение...">
        <button onclick="sendMsg()" class="btn-send">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="black"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
        </button>
    </div>
</div>

<div id="modal-settings" class="modal">
    <div class="modal-box">
        <h3 style="color:var(--neon);">Настройки Tanson</h3>
        <button class="opt-btn" onclick="openModal('modal-secret')">🔒 Секретный режим: Off</button>
        <button class="opt-btn" style="color:red;" onclick="location.reload()">Выход</button>
        <button onclick="closeModals()" style="width:100%; margin-top:20px; background:none; border:none; color:#555;">ЗАКРЫТЬ</button>
    </div>
</div>

<div id="modal-msg-act" class="modal">
    <div class="modal-box">
        <button class="opt-btn" id="del-btn" style="color:red;">🗑️ Удалить у всех</button>
        <button onclick="closeModals()" style="width:100%; margin-top:15px; background:none; border:none; color:#555;">ОТМЕНА</button>
    </div>
</div>

<audio id="r-player"></audio>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const S_URL = 'https://yialdvgdpuazzedpxozc.supabase.co';
    const S_KEY = 'sb_publishable_obvuV6Of_iUSWBy6phzv5w_eSQl0YYt';
    const sb = supabase.createClient(S_URL, S_KEY);
    const user = "Seregasib";

    // РАДИО
    const rPlayer = document.getElementById('r-player');
    function playR(url, name) {
        rPlayer.src = url; rPlayer.play();
        document.getElementById('r-stat').innerText = "Играет: " + name;
    }
    function stopR() {
        rPlayer.pause();
        document.getElementById('r-stat').innerText = "Сейчас: Выключено";
    }

    // РЕКОРДЕР
    let mRec; let chunks = [];
    async function startRec() {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mRec = new MediaRecorder(stream);
        chunks = [];
        document.getElementById('voice-panel').style.display = 'flex';
        document.getElementById('voice-preview').style.display = 'none';
        document.getElementById('rec-send-btn').style.display = 'none';
        document.getElementById('rec-stop-btn').style.display = 'block';
        mRec.start();
        mRec.ondataavailable = e => chunks.push(e.data);
    }
    function stopRec() {
        mRec.stop();
        mRec.onstop = () => {
            const blob = new Blob(chunks, { type: 'audio/ogg' });
            const url = URL.createObjectURL(blob);
            const prev = document.getElementById('voice-preview');
            prev.src = url; prev.style.display = 'block';
            document.getElementById('rec-stop-btn').style.display = 'none';
            document.getElementById('rec-send-btn').style.display = 'block';
        };
    }
    function cancelRec() { document.getElementById('voice-panel').style.display = 'none'; chunks = []; }

    // ЧАТ И ЛОГИКА
    function switchTab(id, btn) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function openChat(name) { document.getElementById('chat-page').style.display = 'flex'; loadMsgs(); }
    function closeChat() { document.getElementById('chat-page').style.display = 'none'; }
    function openModal(id) { closeModals(); document.getElementById(id).style.display = 'flex'; }
    function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }

    async function loadMsgs() {
        const { data } = await sb.from('messages').select('*').order('created_at', {ascending:true});
        const win = document.getElementById('chat-window');
        win.innerHTML = '';
        if(data) data.forEach(m => {
            const isMe = m.user_id === user;
            const div = document.createElement('div');
            div.className = `msg ${isMe ? 'me' : ''}`;
            div.innerHTML = `<div class="msg-u">${m.user_id}</div>${m.text}`;
            
            if(isMe) {
                div.onclick = () => {
                    openModal('modal-msg-act');
                    document.getElementById('del-btn').onclick = async () => {
                        await sb.from('messages').delete().eq('id', m.id);
                        closeModals(); loadMsgs();
                    };
                };
            }
            win.appendChild(div);
        });
        win.scrollTop = win.scrollHeight;
    }

    async function sendMsg() {
        const i = document.getElementById('m-inp');
        if(!i.value.trim()) return;
        await sb.from('messages').insert([{ text: i.value, user_id: user }]);
        i.value = ''; loadMsgs();
    }
</script>
</body>
</html>
