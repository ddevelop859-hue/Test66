<!DOCTYPE html><html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messenger</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script><style>
body {
    margin:0;
    font-family:Arial;
    background:#0b0f2a;
    color:white;
    display:flex;
    flex-direction:column;
    height:100vh;
}

#chat {
    flex:1;
    overflow-y:auto;
    padding:10px;
}

.msg {
    background:#1a1f4a;
    padding:8px;
    border-radius:10px;
    margin:5px 0;
    max-width:70%;
}

.me {
    background:#2a6df5;
    margin-left:auto;
}

.bottom {
    display:flex;
    padding:10px;
    background:#000;
}

input {
    flex:1;
    padding:10px;
    border:none;
    border-radius:10px;
    outline:none;
}

button {
    margin-left:5px;
    padding:10px;
    border:none;
    border-radius:10px;
    background:#2a6df5;
    color:white;
}

#voice-panel {
    display:none;
    padding:10px;
    background:#111;
}
</style></head><body><div id="chat"></div><div id="voice-panel">
    <audio id="preview" controls></audio><br>
    <button onclick="stopRec()">⏹</button>
    <button onclick="sendVoice()">✔</button>
</div><div class="bottom">
    <input id="msg" placeholder="Сообщение...">
    <button onclick="sendMsg()">➤</button>
    <button id="recBtn">🎤</button>
</div><script>
const SUPABASE_URL = "https://yialdvgdpuazzedpxozc.supabase.co";
const SUPABASE_KEY = "sb_publishable_obvuV6Of_iUSWBy6phzv5w_eSQl0YYt";

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let userData = {
    name: "user_" + Math.floor(Math.random()*1000)
};

const chat = document.getElementById("chat");

function render(msg){
    let div = document.createElement("div");
    div.className = "msg" + (msg.user_id === userData.name ? " me":"");

    if(msg.type === "voice"){
        div.innerHTML = `<audio controls src="${msg.voice}"></audio>`;
    } else {
        div.innerText = msg.text;
    }

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

async function load(){
    let {data} = await sb.from("messages").select("*").order("id",{ascending:true});
    chat.innerHTML="";
    data.forEach(render);
}

load();

sb.channel('chat')
.on('postgres_changes',{event:'INSERT',schema:'public',table:'messages'},payload=>{
    render(payload.new);
})
.subscribe();

async function sendMsg(){
    let text = msg.value;
    if(!text) return;

    await sb.from("messages").insert([{
        user_id:userData.name,
        text:text,
        type:"text"
    }]);

    msg.value="";
}

/* ===== ГОЛОС ===== */

let rec, chunks=[], blob;

recBtn.onmousedown = startRec;
recBtn.onmouseup = stopRec;

async function startRec(){
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    rec = new MediaRecorder(stream);
    chunks=[];

    rec.start();

    rec.ondataavailable = e => chunks.push(e.data);

    document.getElementById("voice-panel").style.display = "block";
}

function stopRec(){
    if(!rec) return;
    rec.stop();

    rec.onstop = ()=>{
        blob = new Blob(chunks,{type:'audio/ogg'});
        preview.src = URL.createObjectURL(blob);
    }
}

async function sendVoice(){
    const name = 'voice_'+Date.now()+'.ogg';

    await sb.storage.from('voices').upload(name, blob);

    const { data } = sb.storage.from('voices').getPublicUrl(name);

    await sb.from('messages').insert([{
        user_id:userData.name,
        type:'voice',
        voice:data.publicUrl
    }]);

    document.getElementById("voice-panel").style.display = "none";
}
</script></body>
</html>
