<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tanson</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0f2a;
color:#fff;
display:flex;
flex-direction:column;
height:100vh;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
background:#111;
font-size:18px;
font-weight:bold;
}

#chat{
flex:1;
overflow-y:auto;
padding:10px;
display:flex;
flex-direction:column;
}

.msg{
background:#1a1f4a;
padding:8px 12px;
border-radius:20px;
margin:5px 0;
max-width:70%;
word-wrap:break-word;
}

.me{
background:#2a6df5;
margin-left:auto;
}

.bottom{
display:flex;
padding:10px;
background:#000;
}

input{
flex:1;
padding:10px;
border:none;
border-radius:20px;
outline:none;
background:#111;
color:#fff;
}

button{
margin-left:5px;
padding:10px;
border:none;
border-radius:50%;
background:#2a6df5;
color:#fff;
cursor:pointer;
}

#voice-panel{
display:none;
background:#111;
padding:10px;
text-align:center;
}
</style>
</head>

<body>

<header>
<div>Tanson</div>
<audio controls autoplay loop>
<source src="https://europaplus.rastream.com/europaplus128.mp3">
</audio>
</header>

<div id="chat"></div>

<div id="voice-panel">
<button onclick="stopRec()">⏹</button>
<button onclick="sendVoice()">✔</button>
</div>

<div class="bottom">
<input id="msg" placeholder="Сообщение...">
<button onclick="sendMsg()">➤</button>
<button id="recBtn">🎤</button>
</div>

<script>
const SUPABASE_URL="https://yialdvgdpuazzedpxozc.supabase.co";
const SUPABASE_KEY="sb_publishable_obvuV6Of_iUSWBy6phzv5w_eSQl0YYt";
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

let user={id:"user_"+Math.floor(Math.random()*10000)};
let chat=document.getElementById("chat");
let blob=null;

/* ===== РЕНДЕР ===== */
function render(m){
let d=document.createElement("div");
d.className="msg"+(m.user_id===user.id?" me":"");

if(m.type==="voice"){
let a=document.createElement("audio");
a.src=m.voice;
a.controls=true;
d.appendChild(a);
}else{
d.innerText=m.text;
}

chat.appendChild(d);
chat.scrollTop=chat.scrollHeight;
}

/* ===== ЗАГРУЗКА ===== */
async function load(){
let {data}=await sb.from("messages").select("*").order("id",{ascending:true});
chat.innerHTML="";
data.forEach(render);
}
load();

/* realtime */
sb.channel("chat")
.on("postgres_changes",{event:"INSERT",schema:"public",table:"messages"},p=>{
render(p.new);
})
.subscribe();

/* ===== ТЕКСТ ===== */
async function sendMsg(){
let text=msg.value;
if(!text)return;

let {data}=await sb.from("messages").insert([{
user_id:user.id,
text:text,
type:"text"
}]).select();

msg.value="";
render(data[0]);
}

/* ===== ГОЛОС ===== */
let rec,chunks=[];

recBtn.onmousedown=startRec;
recBtn.onmouseup=stopRec;
recBtn.ontouchstart=startRec;
recBtn.ontouchend=stopRec;

async function startRec(){
const stream=await navigator.mediaDevices.getUserMedia({audio:true});
rec=new MediaRecorder(stream);
chunks=[];
rec.start();

rec.ondataavailable=e=>chunks.push(e.data);

document.getElementById("voice-panel").style.display="block";
}

function stopRec(){
if(!rec)return;
rec.stop();

rec.onstop=()=>{
blob=new Blob(chunks,{type:"audio/ogg"});
};
}

async function sendVoice(){
if(!blob){
alert("Нет записи");
return;
}

let fileName="voice_"+Date.now()+".ogg";

/* загружаем в storage */
let {error}=await sb.storage.from("voices").upload(fileName,blob,{upsert:true});
if(error){
alert("Ошибка загрузки");
return;
}

/* получаем ссылку */
let {data}=sb.storage.from("voices").getPublicUrl(fileName);
let url=data.publicUrl;

/* сохраняем в таблицу */
let {data:msgData}=await sb.from("messages").insert([{
user_id:user.id,
type:"voice",
voice:url
}]).select();

render(msgData[0]);

blob=null;
document.getElementById("voice-panel").style.display="none";
}
</script>

</body>
</html>
