<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tanson Media Edition</title>
    <style>
        :root { --neon: #00ffe1; --gold: #c69c6d; --bg: #050510; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; height: 100vh; overflow: hidden; }
        
        /* SPLASH */
        #splash { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #splash img { width: 120px; opacity: 0.5; filter: drop-shadow(0 0 15px var(--gold)); }
        
        #main-app { display: none; height: 100vh; flex-direction: column; }
        .header { background: #000; padding: 15px; border-bottom: 1px solid #111; display: flex; justify-content: space-between; align-items: center; }
        .header b { color: var(--neon); text-transform: uppercase; font-size: 14px; letter-spacing: 1px; }

        .screen { display: none; flex: 1; overflow-y: auto; padding-bottom: 140px; }
        .screen.active { display: flex; flex-direction: column; }

        /* ЧАТ */
        #chat-window { flex: 1; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .msg { padding: 12px; border-radius: 15px; max-width: 80%; background: #0d0d1a; border: 1px solid #1a1a2a; position: relative; }
        .me { align-self: flex-end; border-color: var(--neon); background: rgba(0,255,225,0.03); }
        .msg-user { font-size: 10px; color: var(--neon); margin-bottom: 5px; opacity: 0.7; }
        
        /* МЕДИА В ЧАТЕ */
        .media-content { width: 100%; border-radius: 10px; margin-top: 5px; }
        audio { width: 100%; height: 35px; filter: invert(1); }

        /* ИНПУТ */
        .input-area { position: fixed; bottom: 70px; left: 0; right: 0; background: #000; padding: 12px; border-top: 1px solid #111; display: flex; gap: 10px; align-items: center; z-index: 999; }
        #m-inp { flex: 1; background: #0f0f1a; border: 1px solid #222; color: #fff; padding: 12px 15px; border-radius: 20px; outline: none; }
        .media-btn { background: none; border: none; font-size: 22px; color: #555; cursor: pointer; transition: 0.2s; }
        .media-btn:active { color: var(--neon); transform: scale(1.1); }

        /* НАВИГАЦИЯ */
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 70px; background: #000; border-top: 1px solid #111; display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-btn { background: none; border: none; color: #444; display: flex; flex-direction: column; align-items: center; font-size: 10px; gap: 4px; }
        .nav-btn.active { color: var(--neon); }
        .nav-btn span { font-size: 20px; }
    </style>
</head>
<body>

<div id="splash">
    <img src="https://img.icons8.com/ios-filled/200/c69c6d/lion.png">
    <div style="width:150px; height:2px; background:#111; margin-top:20px;"><div style="width:100%; height:100%; background:var(--gold); animation: load 2.5s forwards;"></div></div>
</div>

<div id="main-app">
    <div id="scr-chats" class="screen active">
        <div class="header"><b>TANSON</b> <button onclick="openSett()" style="background:none; border:none; font-size:20px;">⚙️</button></div>
        <div style="padding:15px;">
            <div onclick="openChat('Общий Чат')" style="background:rgba(255,255,255,0.02); padding:20px; border-radius:15px; border:1px solid #151525; display:flex; align-items:center; gap:15px;">
                <span style="font-size:24px;">🌍</span>
                <div><b>Общий Чат</b><br><small style="color:#555;">Официальный канал связи</small></div>
            </div>
        </div>
    </div>

    <div id="scr-profile" class="screen">
        <div class="header"><b>Профиль</b></div>
        <div style="text-align:center; padding-top:40px;">
            <div style="width:100px; height:100px; border-radius:50%; border:2px solid var(--neon); margin: 0 auto 20px; display:flex; align-items:center; justify-content:center; font-size:40px;">👤</div>
            <h2 id="u-name">Seregasib</h2>
        </div>
    </div>

    <div class="nav-bar">
        <button class="nav-btn active" onclick="switchTab('scr-chats', this)"><span>💬</span>Чаты</button>
        <button class="nav-btn" onclick="switchTab('scr-profile', this)"><span>👤</span>Профиль</button>
    </div>
</div>

<div id="chat-page" style="position:fixed; inset:0; background:var(--bg); z-index:2000; display:none; flex-direction:column;">
    <div class="header">
        <button onclick="closeChat()" style="background:none; border:none; color:var(--neon); font-size:24px;">←</button>
        <b id="chat-title">Чат</b>
        <span style="font-size:10px; color:#0f0;">online</span>
    </div>
    <div id="chat-window"></div>
    <div class="input-area">
        <button class="media-btn" onclick="triggerFile('video/*')">📎</button>
        <button class="media-btn" onclick="triggerFile('audio/*')">🎤</button>
        <input id="m-inp" placeholder="Сообщение...">
        <button onclick="sendMsg()" style="background:var(--neon); border:none; width:40px; height:40px; border-radius:50%; font-size:18px;">➤</button>
    </div>
    <input type="file" id="hidden-file" style="display:none;" onchange="handleFile(this)">
</div>

<div id="sett-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:3000; align-items:center; justify-content:center;">
    <div style="background:#0a0a15; padding:25px; border-radius:20px; border:1px solid #1a1a2a; width:280px;">
        <h3 style="color:var(--neon); margin-top:0;">Настройки</h3>
        <p style="font-size:13px;">Статус: <span style="color:var(--neon)">в сети</span></p>
        <p style="font-size:13px; color:#ff00ff;">Секретный режим: <span style="color:#777">Выключено</span></p>
        <button onclick="closeSett()" style="width:100%; padding:12px; background:var(--neon); border:none; border-radius:10px; font-weight:bold; margin-top:15px;">ЗАКРЫТЬ</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // ТВОИ КОНФИГУРАЦИИ
    const S_URL = 'https://yialdvgdpuazzedpxozc.supabase.co';
    const S_KEY = 'sb_publishable_obvuV6Of_iUSWBy6phzv5w_eSQl0YYt';
    const sb = supabase.createClient(S_URL, S_KEY);
    const user = "Seregasib";

    window.onload = () => { setTimeout(() => { document.getElementById('splash').style.display='none'; document.getElementById('main-app').style.display='flex'; }, 2500); };

    function switchTab(id, btn) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function openChat(name) { document.getElementById('chat-page').style.display='flex'; document.getElementById('chat-title').innerText=name; loadMsgs(); }
    function closeChat() { document.getElementById('chat-page').style.display='none'; }
    function openSett() { document.getElementById('sett-modal').style.display='flex'; }
    function closeSett() { document.getElementById('sett-modal').style.display='none'; }

    // РАБОТА С МЕДИА
    function triggerFile(type) { 
        const f = document.getElementById('hidden-file');
        f.accept = type;
        f.click();
    }

    async function handleFile(input) {
        if(!input.files[0]) return;
        const file = input.files[0];
        // Тут логика загрузки в Storage Supabase, если настроен бакет
        alert("Файл " + file.name + " готов к отправке (нужен настроенный Storage)");
    }

    async function loadMsgs() {
        const { data } = await sb.from('messages').select('*').order('created_at', {ascending:true});
        const win = document.getElementById('chat-window');
        win.innerHTML = '';
        if(data) data.forEach(m => {
            const isMe = m.user_id === user;
            const div = document.createElement('div');
            div.className = `msg ${isMe ? 'me' : ''}`;
            
            let content = m.text || '';
            // Если в сообщении ссылка на медиа (примерная логика)
            if(content.includes('.mp4')) content = `<video class="media-content" controls src="${content}"></video>`;
            if(content.includes('.mp3')) content = `<audio controls src="${content}"></audio>`;

            div.innerHTML = `<div class="msg-user">${m.user_id}</div>${content}`;
            win.appendChild(div);
        });
        win.scrollTop = win.scrollHeight;
    }

    async function sendMsg() {
        const i = document.getElementById('m-inp');
        if(!i.value.trim()) return;
        const txt = i.value; i.value = '';
        await sb.from('messages').insert([{ text: txt, user_id: user, channel: 'global' }]);
        loadMsgs();
    }

    @keyframes load { from { width: 0; } to { width: 100%; } }
</script>
</body>
</html>
