<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tanson Platinum</title>
    <style>
        :root { --neon: #00ffe1; --pink: #ff00ff; --bg: #050510; --panel: #0a0a1a; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Фикс для того, чтобы контент не залезал под клавиатуру */
        .screen { display: none; flex-direction: column; height: 100%; position: relative; }
        .active { display: flex; }

        .header { background: #000; padding: 10px 15px; border-bottom: 1px solid var(--neon); display: flex; justify-content: space-between; align-items: center; min-height: 50px; }
        
        /* Список контактов */
        #contacts-list { padding: 15px; flex: 1; overflow-y: auto; padding-bottom: 80px; }
        .contact-item { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #222; display: flex; align-items: center; gap: 10px; }

        /* Окно чата */
        #chat-window { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; padding-bottom: 100px; }
        .msg { padding: 10px 14px; border-radius: 15px; max-width: 80%; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); position: relative; word-wrap: break-word; }
        .me { align-self: flex-end; border-color: var(--neon); background: rgba(0,255,225,0.1); }
        
        /* ЖЕСТКИЙ ФИКС ПАНЕЛИ ВВОДА */
        .input-area { 
            position: fixed; bottom: 0; left: 0; right: 0;
            padding: 12px; background: #000; border-top: 1px solid #222;
            display: flex; gap: 8px; align-items: center; z-index: 9999;
        }
        
        .circle-btn { width: 44px; height: 44px; border-radius: 50%; border: none; background: var(--neon); color: #000; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 20px; }
        #m-inp { flex: 1; background: #111; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 25px; outline: none; font-size: 16px; }

        /* Меню удаления */
        #del-menu { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 10000; align-items: center; justify-content: center; }
        .del-box { background: var(--panel); padding: 25px; border-radius: 20px; border: 1px solid var(--neon); width: 280px; text-align: center; }

        #voice-btn.recording { background: #ff0055; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.4; } }
        audio { width: 100%; height: 35px; filter: invert(1); margin-top: 5px; }
    </style>
</head>
<body>

<div id="auth-screen" style="position:fixed; inset:0; background:var(--bg); z-index:10001; display:flex; align-items:center; justify-content:center;">
    <div style="text-align:center; padding:30px; border:1px solid var(--neon); border-radius:20px; background:#000;">
        <h2 style="color:var(--neon); margin:0 0 20px 0;">TANSON</h2>
        <input id="nick-inp" style="padding:12px; width:200px; border-radius:10px; border:1px solid #333; background:#111; color:#fff;" placeholder="Ник...">
        <button onclick="login()" style="display:block; width:100%; margin-top:15px; padding:12px; background:var(--neon); border:none; border-radius:10px; font-weight:bold;">ВОЙТИ</button>
    </div>
</div>

<div id="del-menu" onclick="this.style.display='none'">
    <div class="del-box" onclick="event.stopPropagation()">
        <button id="del-all-btn" style="width:100%; padding:12px; margin-bottom:12px; background:var(--neon); border:none; border-radius:10px; font-weight:bold;">Удалить у всех</button>
        <button id="del-me-btn" style="width:100%; padding:12px; background:#333; color:#fff; border:none; border-radius:10px;">Удалить только у себя</button>
    </div>
</div>

<div id="main-screen" class="screen active">
    <div class="header">
        <b style="color:var(--neon); letter-spacing:1px;">TANSON</b>
        <div style="display:flex; gap:8px; align-items:center;">
            <input type="text" id="search-inp" style="width:70px; background:#111; border:1px solid #333; color:#fff; border-radius:5px; padding:4px;" placeholder="Ник">
            <button onclick="addFriend()" style="background:none; border:none; color:var(--neon); font-size:18px;">🔍</button>
            <button style="background:none; border:none; color:#555; font-size:18px;">⚙️</button>
        </div>
    </div>
    <div id="contacts-list"></div>
</div>

<div id="chat-screen" class="screen">
    <div class="header">
        <div style="display:flex; align-items:center; gap:10px;">
            <button onclick="goMain()" style="background:none; border:none; color:var(--neon); font-size:24px;">←</button>
            <b id="chat-title">Чат</b>
        </div>
        <div style="color:#00ff00; font-size:10px;">в сети</div>
    </div>
    <div id="chat-window"></div>
    <div id="typing-ui" style="color:var(--neon); font-size:10px; position:absolute; bottom:75px; left:20px; opacity:0;">печатает...</div>
    <div class="input-area">
        <button class="circle-btn" style="background:none; border:1px solid var(--neon); color:var(--neon);" onclick="document.getElementById('f-up').click()">📎</button>
        <button id="voice-btn" class="circle-btn" style="background:none; border:1px solid var(--pink); color:var(--pink);">🎤</button>
        <input id="m-inp" placeholder="Сообщение..." oninput="sendTyping()">
        <button class="circle-btn" onclick="send('text')">➤</button>
    </div>
</div>

<input type="file" id="f-up" style="display:none" accept="image/*" onchange="upFile(this.files[0])">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const S_URL = 'https://yialdvgdpuazzedpxozc.supabase.co';
    const S_KEY = 'sb_publishable_obvuV6Of_iUSWBy6phzv5w_eSQl0YYt'; 
    const sb = supabase.createClient(S_URL, S_KEY);
    const audioIn = new Audio('https://cdn.pixabay.com/audio/2021/08/04/audio_0625c1539c.mp3');

    let user = localStorage.getItem("tanson_nick");
    let currentChannel = 'global';
    let mediaRec, chunks = [], pTimer, selId;
    let friends = JSON.parse(localStorage.getItem("t_friends") || "[]");

    if(user) { document.getElementById('auth-screen').style.display='none'; init(); }

    function login() {
        const n = document.getElementById('nick-inp').value.trim();
        if(n) { localStorage.setItem("tanson_nick", n); location.reload(); }
    }

    function addFriend() {
        const n = document.getElementById('search-inp').value.trim();
        if(n && !friends.includes(n) && n !== user) {
            friends.push(n);
            localStorage.setItem("t_friends", JSON.stringify(friends));
            renderContacts();
            document.getElementById('search-inp').value = '';
        }
    }

    function renderContacts() {
        const c = document.getElementById('contacts-list');
        c.innerHTML = '<div class="contact-item" onclick="goChat(\'global\')"><b>🌍 Общий Чат</b></div>';
        friends.forEach(f => { c.innerHTML += `<div class="contact-item" onclick="goChat('${f}')"><b>👤 ${f}</b></div>`; });
    }

    function goChat(chan) {
        currentChannel = chan;
        document.getElementById('main-screen').classList.remove('active');
        document.getElementById('chat-screen').classList.add('active');
        document.getElementById('chat-title').innerText = chan === 'global' ? 'Общий Чат' : chan;
        document.getElementById('chat-window').innerHTML = '';
        load();
    }

    function goMain() {
        document.getElementById('chat-screen').classList.remove('active');
        document.getElementById('main-screen').classList.add('active');
    }

    async function init() {
        renderContacts();
        sb.channel('tanson_v8').on('postgres_changes', {event:'*', schema:'public', table:'messages'}, p => {
            if(p.eventType === 'INSERT') {
                const m = p.new;
                if(m.channel === currentChannel || (!m.channel && currentChannel === 'global') || (m.channel === user && m.user_id === currentChannel)) {
                    renderMsg(m);
                    if(m.user_id !== user) audioIn.play().catch(()=>{});
                }
            }
            if(p.eventType === 'DELETE') document.getElementById('msg-' + p.old.id)?.remove();
        }).on('broadcast', {event:'typing'}, p => {
            if(p.payload.u === currentChannel) {
                document.getElementById('typing-ui').style.opacity = 1;
                clearTimeout(window.tOut);
                window.tOut = setTimeout(() => document.getElementById('typing-ui').style.opacity = 0, 2000);
            }
        }).subscribe();
        setupVoice();
    }

    async function load() {
        const { data } = await sb.from('messages').select('*').order('created_at', {ascending:true});
        if(data) data.forEach(m => {
            const isGlobal = (m.channel === 'global' || !m.channel) && currentChannel === 'global';
            const isPrivate = (m.channel === currentChannel && m.user_id === user) || (m.channel === user && m.user_id === currentChannel);
            if(isGlobal || isPrivate) renderMsg(m);
        });
    }

    function renderMsg(d) {
        if(document.getElementById('msg-'+d.id)) return;
        const win = document.getElementById('chat-window');
        const div = document.createElement('div');
        div.id = 'msg-'+d.id;
        div.className = `msg ${d.user_id === user ? 'me' : ''}`;
        
        let html = `<small style="color:var(--neon); font-size:9px;">${d.user_id}</small><br>`;
        if(d.type==='voice') html += `<audio src="${d.file_url}" controls></audio>`;
        else if(d.type==='image') html += `<img src="${d.file_url}" style="max-width:100%; border-radius:10px; margin-top:5px;">`;
        else html += d.text || "";
        
        div.innerHTML = html;
        const start = () => pTimer = setTimeout(() => { selId=d.id; document.getElementById('del-menu').style.display='flex'; }, 800);
        const stop = () => clearTimeout(pTimer);
        div.onmousedown = start; div.onmouseup = stop;
        div.ontouchstart = start; div.ontouchend = stop;

        win.appendChild(div);
        win.scrollTop = win.scrollHeight;
    }

    document.getElementById('del-all-btn').onclick = async () => {
        await sb.from('messages').delete().eq('id', selId);
        document.getElementById('del-menu').style.display = 'none';
    };
    document.getElementById('del-me-btn').onclick = () => {
        document.getElementById('msg-' + selId)?.remove();
        document.getElementById('del-menu').style.display = 'none';
    };

    async function send(t, url=null) {
        const i = document.getElementById('m-inp');
        if(!i.value.trim() && !url) return;
        await sb.from('messages').insert([{ text: i.value, user_id: user, type: t, file_url: url, channel: currentChannel }]);
        i.value = '';
    }

    function sendTyping() { 
        sb.channel('tanson_v8').send({type:'broadcast', event:'typing', payload:{u:user}}); 
    }

    function setupVoice() {
        const btn = document.getElementById('voice-btn');
        btn.onclick = async () => {
            if(mediaRec && mediaRec.state === "recording") { mediaRec.stop(); btn.classList.remove('recording'); return; }
            const s = await navigator.mediaDevices.getUserMedia({audio:true});
            mediaRec = new MediaRecorder(s); chunks = [];
            mediaRec.ondataavailable = e => chunks.push(e.data);
            mediaRec.onstop = async () => {
                const blob = new Blob(chunks, {type: 'audio/webm'});
                const name = `v_${Date.now()}.webm`;
                const { data } = await sb.storage.from('uploads').upload(name, blob);
                if(data) {
                    const { data: { publicUrl } } = sb.storage.from('uploads').getPublicUrl(name);
                    send('voice', publicUrl);
                }
                s.getTracks().forEach(t => t.stop());
            };
            mediaRec.start(); btn.classList.add('recording');
        };
    }

    async function upFile(f) {
        if(!f) return;
        const name = `img_${Date.now()}`;
        const { data } = await sb.storage.from('uploads').upload(name, f);
        if(data) {
            const { data: { publicUrl } } = sb.storage.from('uploads').getPublicUrl(name);
            send('image', publicUrl);
        }
    }
</script>
</body>
</html>
