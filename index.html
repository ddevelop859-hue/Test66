<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tanson Platinum</title>
    <style>
        :root { --neon: #00ffe1; --pink: #ff00ff; --bg: #050510; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* Шапка */
        .header { background: #000; padding: 10px 15px; border-bottom: 1px solid var(--neon); display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        
        /* Главный контейнер */
        .screen { display: none; flex-direction: column; flex: 1; overflow: hidden; position: relative; }
        .active { display: flex; }

        /* Окно сообщений */
        #chat-window { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; padding-bottom: 80px; }
        .msg { padding: 10px 14px; border-radius: 15px; max-width: 80%; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); word-wrap: break-word; position: relative; }
        .me { align-self: flex-end; border-color: var(--neon); background: rgba(0,255,225,0.1); }

        /* ПАНЕЛЬ ВВОДА - ФИКСИРОВАННАЯ */
        .input-area { 
            position: fixed; bottom: 0; left: 0; right: 0;
            background: #000; padding: 10px; border-top: 1px solid #222;
            display: flex; gap: 8px; align-items: center; z-index: 100;
        }
        #m-inp { flex: 1; background: #111; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 25px; outline: none; }
        .circle-btn { width: 42px; height: 42px; border-radius: 50%; border: none; background: var(--neon); color: #000; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

        /* Меню удаления и настройки */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 200; align-items: center; justify-content: center; }
        .modal-box { background: #111; padding: 25px; border-radius: 20px; border: 1px solid var(--neon); width: 280px; text-align: center; }
        
        .contact-item { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #222; }
        #voice-btn.recording { background: var(--pink); animation: pulse 1s infinite; }
        @keyframes pulse { 50% { opacity: 0.5; } }
        audio { width: 100%; height: 35px; filter: invert(1); }
    </style>
</head>
<body>

<div id="settings-modal" class="modal" onclick="this.style.display='none'">
    <div class="modal-box" onclick="event.stopPropagation()">
        <h3 style="color:var(--neon)">Настройки Tanson</h3>
        <p style="font-size: 12px; color: #666;">Версия: Platinum 1.0</p>
        <button onclick="localStorage.clear(); location.reload();" style="width:100%; padding:10px; background:#ff0055; border:none; border-radius:10px; color:#fff;">Выйти из аккаунта</button>
        <button onclick="document.getElementById('settings-modal').style.display='none'" style="width:100%; padding:10px; margin-top:10px; background:#333; border:none; border-radius:10px; color:#fff;">Закрыть</button>
    </div>
</div>

<div id="del-modal" class="modal" onclick="this.style.display='none'">
    <div class="modal-box" onclick="event.stopPropagation()">
        <button id="del-all-btn" style="width:100%; padding:12px; margin-bottom:10px; background:var(--neon); border:none; border-radius:10px; font-weight:bold;">Удалить у всех</button>
        <button id="del-me-btn" style="width:100%; padding:12px; background:#333; border:none; border-radius:10px; color:#fff;">Удалить у себя</button>
    </div>
</div>

<div id="main-screen" class="screen active">
    <div class="header">
        <b style="color:var(--neon)">TANSON</b>
        <div style="display:flex; gap:10px; align-items:center;">
            <input id="search-friend" style="width:70px; background:#111; border:none; color:#fff; border-radius:5px; padding:5px;" placeholder="Ник">
            <button onclick="addFriend()" style="background:none; border:none; color:var(--neon); font-size:18px;">🔍</button>
            <button onclick="document.getElementById('settings-modal').style.display='flex'" style="background:none; border:none; color:var(--neon); font-size:18px;">⚙️</button>
        </div>
    </div>
    <div id="contacts-list" style="padding:15px;"></div>
</div>

<div id="chat-screen" class="screen">
    <div class="header">
        <div style="display:flex; align-items:center; gap:10px;">
            <button onclick="goMain()" style="background:none; border:none; color:var(--neon); font-size:24px;">←</button>
            <b id="chat-title">Чат</b>
        </div>
        <div id="online-status" style="color:#00ff00; font-size:10px;">в сети</div>
    </div>
    <div id="chat-window"></div>
    <div id="typing-ui" style="position:fixed; bottom:65px; left:20px; color:var(--neon); font-size:10px; opacity:0; transition:0.3s;">печатает...</div>
    <div class="input-area">
        <button class="circle-btn" style="background:none; border:1px solid var(--neon); color:var(--neon);" onclick="document.getElementById('f-up').click()">📎</button>
        <button id="voice-btn" class="circle-btn" style="background:none; border:1px solid var(--pink); color:var(--pink);">🎤</button>
        <input id="m-inp" placeholder="Сообщение..." oninput="sendTyping()">
        <button class="circle-btn" onclick="sendMsg('text')">➤</button>
    </div>
</div>

<input type="file" id="f-up" style="display:none" accept="image/*" onchange="upFile(this.files[0])">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const S_URL = 'https://yialdvgdpuazzedpxozc.supabase.co';
    const S_KEY = 'sb_publishable_obvuV6Of_iUSWBy6phzv5w_eSQl0YYt'; 
    const sb = supabase.createClient(S_URL, S_KEY);
    const pushSound = new Audio('https://cdn.pixabay.com/audio/2021/08/04/audio_0625c1539c.mp3');

    let user = localStorage.getItem("tanson_user") || prompt("Твой ник:");
    if(user) localStorage.setItem("tanson_user", user);

    let curChan = 'global';
    let mediaRec, chunks = [], pTimer, selId;
    let friends = JSON.parse(localStorage.getItem("tanson_friends") || "[]");

    function addFriend() {
        const n = document.getElementById('search-friend').value.trim();
        if(n && !friends.includes(n) && n !== user) {
            friends.push(n);
            localStorage.setItem("tanson_friends", JSON.stringify(friends));
            renderContacts();
        }
    }

    function renderContacts() {
        const c = document.getElementById('contacts-list');
        c.innerHTML = '<div class="contact-item" onclick="goChat(\'global\')">🌍 Общий Чат</div>';
        friends.forEach(f => { c.innerHTML += `<div class="contact-item" onclick="goChat('${f}')">👤 ${f}</div>`; });
    }

    function goChat(chan) {
        curChan = chan;
        document.getElementById('main-screen').classList.remove('active');
        document.getElementById('chat-screen').classList.add('active');
        document.getElementById('chat-title').innerText = chan === 'global' ? 'Общий Чат' : chan;
        document.getElementById('chat-window').innerHTML = '';
        load();
    }

    function goMain() {
        document.getElementById('chat-screen').classList.remove('active');
        document.getElementById('main-screen').classList.add('active');
    }

    async function init() {
        renderContacts();
        sb.channel('tanson_v9').on('postgres_changes', {event:'*', schema:'public', table:'messages'}, p => {
            if(p.eventType === 'INSERT') {
                const m = p.new;
                if(m.channel === curChan || (!m.channel && curChan === 'global') || (m.channel === user && m.user_id === curChan)) {
                    renderMsg(m);
                    if(m.user_id !== user) pushSound.play().catch(()=>{});
                }
            }
            if(p.eventType === 'DELETE') document.getElementById('msg-' + p.old.id)?.remove();
        }).on('broadcast', {event:'typing'}, p => {
            if(p.payload.u === curChan) {
                document.getElementById('typing-ui').style.opacity = 1;
                clearTimeout(window.tOut);
                window.tOut = setTimeout(() => document.getElementById('typing-ui').style.opacity = 0, 2000);
            }
        }).subscribe();
        setupAudio();
    }

    async function load() {
        const { data } = await sb.from('messages').select('*').order('created_at', {ascending:true});
        if(data) data.forEach(m => {
            const isGlob = (m.channel === 'global' || !m.channel) && curChan === 'global';
            const isPriv = (m.channel === curChan && m.user_id === user) || (m.channel === user && m.user_id === curChan);
            if(isGlob || isPriv) renderMsg(m);
        });
    }

    function renderMsg(d) {
        if(document.getElementById('msg-'+d.id)) return;
        const win = document.getElementById('chat-window');
        const div = document.createElement('div');
        div.id = 'msg-'+d.id;
        div.className = `msg ${d.user_id === user ? 'me' : ''}`;
        
        let h = `<small style="color:var(--neon); font-size:9px;">${d.user_id}</small><br>`;
        if(d.type==='voice') h += `<audio src="${d.file_url}" controls></audio>`;
        else if(d.type==='image') h += `<img src="${d.file_url}" style="max-width:100%; border-radius:10px; margin-top:5px;">`;
        else h += d.text || "";
        
        div.innerHTML = h;
        const start = () => pTimer = setTimeout(() => { selId=d.id; document.getElementById('del-modal').style.display='flex'; }, 800);
        const stop = () => clearTimeout(pTimer);
        div.onmousedown = start; div.onmouseup = stop;
        div.ontouchstart = start; div.ontouchend = stop;

        win.appendChild(div);
        win.scrollTop = win.scrollHeight;
    }

    document.getElementById('del-all-btn').onclick = async () => {
        await sb.from('messages').delete().eq('id', selId);
        document.getElementById('del-modal').style.display = 'none';
    };
    document.getElementById('del-me-btn').onclick = () => {
        document.getElementById('msg-' + selId)?.remove();
        document.getElementById('del-modal').style.display = 'none';
    };

    async function sendMsg(t, url=null) {
        const i = document.getElementById('m-inp');
        if(!i.value.trim() && !url) return;
        await sb.from('messages').insert([{ text: i.value, user_id: user, type: t, file_url: url, channel: curChan }]);
        i.value = '';
    }

    function sendTyping() { sb.channel('tanson_v9').send({type:'broadcast', event:'typing', payload:{u:user}}); }

    function setupAudio() {
        const btn = document.getElementById('voice-btn');
        btn.onclick = async () => {
            if(mediaRec && mediaRec.state === "recording") { mediaRec.stop(); btn.classList.remove('recording'); return; }
            const s = await navigator.mediaDevices.getUserMedia({audio:true});
            mediaRec = new MediaRecorder(s); chunks = [];
            mediaRec.ondataavailable = e => chunks.push(e.data);
            mediaRec.onstop = async () => {
                const b = new Blob(chunks, {type: 'audio/webm'});
                const n = `v_${Date.now()}.webm`;
                const { data } = await sb.storage.from('uploads').upload(n, b);
                if(data) {
                    const { data: { publicUrl } } = sb.storage.from('uploads').getPublicUrl(n);
                    sendMsg('voice', publicUrl);
                }
                s.getTracks().forEach(t => t.stop());
            };
            mediaRec.start(); btn.classList.add('recording');
        };
    }

    async function upFile(f) {
        if(!f) return;
        const n = `img_${Date.now()}`;
        const { data } = await sb.storage.from('uploads').upload(n, f);
        if(data) {
            const { data: { publicUrl } } = sb.storage.from('uploads').getPublicUrl(n);
            sendMsg('image', publicUrl);
        }
    }
    init();
</script>
</body>
</html>
