 <!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tanson Messenger</title>

<style>
:root { --neon:#00f2ff; --bg:#050510; --panel:#0a0a15; }

body{
    margin:0;
    font-family:Segoe UI;
    background:var(--bg);
    color:#fff;
    overflow:hidden;
}

#app{height:100dvh;display:flex;flex-direction:column;}

.header{
    background:#000;
    padding:12px;
    display:flex;
    justify-content:space-between;
    border-bottom:1px solid #222;
}

#chat{
    flex:1;
    overflow:auto;
    padding:15px;
    display:flex;
    flex-direction:column;
    gap:10px;
    padding-bottom:140px;
}

.msg{
    max-width:80%;
    padding:10px;
    border-radius:15px;
    background:#111;
}
.me{align-self:flex-end;background:#003b44;}

.name{font-size:10px;color:var(--neon);}

.typing{
    font-size:12px;
    color:#888;
    margin-left:5px;
}

/* INPUT */
.input{
    position:fixed;
    bottom:0;
    width:100%;
    background:#000;
    display:flex;
    gap:10px;
    padding:10px;
}

input{
    flex:1;
    border:none;
    border-radius:20px;
    padding:10px;
    background:#111;
    color:#fff;
}

button{
    border:none;
    background:var(--neon);
    border-radius:50%;
    width:40px;
    height:40px;
}
</style>
</head>

<body>

<div id="app">

<div class="header">
<b>Tanson</b>
<div id="online">🟢 0 online</div>
</div>

<div id="chat"></div>

<div id="typing" class="typing"></div>

<div class="input">
<input id="inp" placeholder="Сообщение...">
<button onclick="send()">➤</button>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>

const sb = supabase.createClient(
'https://yialdvgdpuazzedpxozc.supabase.co',
'sb_publishable_obvuV6Of_iUSWBy6phzv5w_eSQl0YYt'
);

/* USER */
const user = localStorage.name || prompt("Имя?") || "Anon";
localStorage.name = user;

/* ELEMENTS */
const chat = document.getElementById('chat');
const inp = document.getElementById('inp');
const typingDiv = document.getElementById('typing');

/* ADD MSG */
function addMsg(m){
    const div = document.createElement('div');
    div.className='msg ' + (m.user_id===user?'me':'');

    div.innerHTML = `
        <div class="name">${m.user_id}</div>
        <div>${m.text}</div>
    `;

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

/* LOAD */
async function load(){
    const {data} = await sb.from('messages').select('*').order('created_at');
    chat.innerHTML='';
    data.forEach(addMsg);
}

/* SEND */
async function send(){
    if(!inp.value.trim()) return;

    await sb.from('messages').insert([
        {text:inp.value,user_id:user}
    ]);

    inp.value='';
}

/* ENTER */
inp.addEventListener('keydown',e=>{
    if(e.key==='Enter') send();
});

/* REALTIME */
sb.channel('room')
.on('postgres_changes',{
    event:'INSERT',
    schema:'public',
    table:'messages'
},payload=>{
    addMsg(payload.new);
})
.subscribe();

/* TYPING */
let typingTimeout;

inp.addEventListener('input', async ()=>{
    await sb.from('typing').upsert([{user_id:user,typing:true}]);

    clearTimeout(typingTimeout);
    typingTimeout = setTimeout(()=>{
        sb.from('typing').upsert([{user_id:user,typing:false}]);
    },1000);
});

sb.channel('typing')
.on('postgres_changes',{
    event:'UPDATE',
    schema:'public',
    table:'typing'
},async ()=>{
    const {data} = await sb.from('typing').select('*').eq('typing',true);
    const others = data.filter(u=>u.user_id!==user);

    typingDiv.textContent = others.length ? "печатает..." : "";
})
.subscribe();

/* ONLINE */
setInterval(()=>{
    sb.from('online').upsert([{user_id:user,last:Date.now()}]);
},5000);

setInterval(async ()=>{
    const now = Date.now();
    const {data} = await sb.from('online').select('*');
    const online = data.filter(u=>now - u.last < 10000);

    document.getElementById('online').textContent = "🟢 " + online.length + " online";
},3000);

/* INIT */
load();

</script>

</body>
</html>
